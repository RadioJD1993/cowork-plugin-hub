<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoWork Plugin Catalog</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --ink: #1f2328;
        --muted: #59636e;
        --line: #d0d7de;
        --blue: #0969da;
        --green: #1a7f37;
        --yellow: #9a6700;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: end;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .source {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        text-decoration: none;
        background: var(--panel);
        white-space: nowrap;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin: 24px 0;
      }

      input {
        min-height: 44px;
        width: 100%;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      .count {
        min-width: 120px;
        color: var(--muted);
        text-align: right;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }

      article {
        min-height: 260px;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 12px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      h2 {
        margin: 0;
        font-size: 1.25rem;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        padding: 0 10px;
        border-radius: 999px;
        background: #eef4ff;
        color: #0550ae;
        font-size: 0.86rem;
      }

      .pill.version {
        background: #dafbe1;
        color: var(--green);
      }

      .pill.components {
        background: #fff8c5;
        color: var(--yellow);
      }

      code {
        display: block;
        overflow-x: auto;
        min-height: 38px;
        padding: 10px;
        border-radius: 6px;
        background: #f6f8fa;
        color: #24292f;
        font-size: 0.88rem;
      }

      .empty {
        display: none;
        padding: 24px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
      }

      @media (max-width: 720px) {
        header,
        .toolbar {
          grid-template-columns: 1fr;
          align-items: stretch;
        }

        .source,
        .count {
          justify-content: flex-start;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>CoWork Plugin Catalog</h1>
          <p>Sanitized, installable plugins generated from the public marketplace manifest.</p>
        </div>
        <a class="source" href="https://github.com/RadioJD1993/cowork-plugin-hub">Source repo</a>
      </header>

      <section class="toolbar" aria-label="Catalog tools">
        <input id="search" type="search" placeholder="Search plugins, categories, or keywords" autocomplete="off">
        <div id="count" class="count">Loading</div>
      </section>

      <section id="grid" class="grid" aria-live="polite"></section>
      <p id="empty" class="empty">No plugins match that search.</p>
    </main>

    <script>
      const grid = document.getElementById("grid");
      const search = document.getElementById("search");
      const count = document.getElementById("count");
      const empty = document.getElementById("empty");
      let plugins = [];

      function searchable(plugin) {
        return [
          plugin.name,
          plugin.category,
          plugin.description,
          plugin.componentSummary,
          ...(plugin.keywords || [])
        ].join(" ").toLowerCase();
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function render() {
        const query = search.value.trim().toLowerCase();
        const visible = plugins.filter((plugin) => searchable(plugin).includes(query));
        grid.innerHTML = visible.map((plugin) => `
          <article>
            <h2>${escapeHtml(plugin.name)}</h2>
            <div class="meta">
              <span class="pill version">${escapeHtml(plugin.version || "unversioned")}</span>
              <span class="pill">${escapeHtml(plugin.category || "uncategorized")}</span>
              <span class="pill components">${escapeHtml(plugin.componentSummary)}</span>
            </div>
            <p>${escapeHtml(plugin.description)}</p>
            <code>${escapeHtml(plugin.install)}</code>
          </article>
        `).join("");
        count.textContent = `${visible.length} of ${plugins.length}`;
        empty.style.display = visible.length ? "none" : "block";
      }

      fetch("catalog.json")
        .then((response) => response.json())
        .then((catalog) => {
          plugins = catalog.plugins || [];
          render();
        })
        .catch(() => {
          count.textContent = "Unavailable";
          empty.textContent = "The catalog JSON could not be loaded.";
          empty.style.display = "block";
        });

      search.addEventListener("input", render);
    </script>
  </body>
</html>
