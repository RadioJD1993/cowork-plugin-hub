name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"
      - "codex/**"
  schedule:
    - cron: "0 6 * * 1" # weekly drift check (Mondays 06:00 UTC)

jobs:
  hub-validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run hub validation
        run: npm run validate

      - name: Run validator unit tests
        run: npm test

      - name: Check Markdown links
        run: npm run links

      - name: Check generated catalog
        run: npm run catalog:check

  node-compat:
    name: node 18 compatibility (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate the engines floor (no dev dependencies)
        run: npm run validate && npm run links && npm run catalog:check

  cli-validate:
    name: claude plugin validate (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true # advisory until the CLI version is pinned; hub-validate is the gate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        # Pin to a specific version (e.g. @anthropic-ai/claude-code@x.y.z) to make this
        # job a reliable required gate instead of an advisory drift check.
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace manifest
        run: claude plugin validate .claude-plugin/marketplace.json

      - name: Validate plugin-builder (strict)
        run: claude plugin validate ./plugins/plugin-builder --strict
